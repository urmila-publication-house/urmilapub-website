{{ define "main" }}
<article class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <h1 class="display-5">{{ .Title }}</h1>
      <p class="text-muted">{{ .Date.Format "January 2, 2006" }} | {{ with .Params.tags }}Tags: {{ delimit . ", " }}{{ end }}</p>
      <div class="content">
        {{ .Content }}
      </div>
      {{ partial "disqus.html" . }}
    </div>
  </div>
</article>
{{ end }}
