<div class="swiper booksSwiper">
  <div class="swiper-wrapper">
    {{ $books := .Site.Data.books }}
    {{ $limit := .Site.Params.numberOfFeaturedBooks | default 3 }}
    {{ if $books }}
      {{ range first $limit $books }}
      <div class="swiper-slide">
        <div class="card h-100 border-0 shadow-sm">
          <img src="{{ "images/" | relURL }}{{ index .gallery 0 | default "placeholder-cover.jpg" }}" class="card-img-top" alt="{{ .title }}">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">{{ .title }}</h5>
            <p class="card-text small">{{ .description | truncate 100 }}</p>
            <a href="{{ "/books/" | relURL }}{{ .slug }}/" class="btn btn-gold mt-auto">View Details</a>
          </div>
        </div>
      </div>
      {{ end }}
    {{ end }}
  </div>
  <div class="swiper-pagination"></div>
  <div class="swiper-button-prev"></div>
  <div class="swiper-button-next"></div>
</div>
