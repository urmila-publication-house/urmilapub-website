{{ define "main" }}
<div class="container py-5">
  <h1 class="section-title">Tag: {{ .Title }}</h1>
  <div class="row">
    {{ range .Pages }}
    <div class="col-md-6 mb-3">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h5><a href="{{ .Permalink }}">{{ .Title }}</a></h5>
          <p class="text-muted small">{{ .Date.Format "Jan 2, 2006" }}</p>
        </div>
      </div>
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
