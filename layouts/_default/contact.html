{{ define "main" }}
<div class="container py-5">
  <h1 class="section-title text-center mb-5">{{ .Title }}</h1>
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="contact">
        <p class="d-none"><input name="bot-field"></p>
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input type="text" name="name" id="name" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" name="email" id="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="phone" class="form-label">Phone</label>
          <input type="tel" name="phone" id="phone" class="form-control">
        </div>
        <div class="mb-3">
          <label for="book" class="form-label">Book Title (if applicable)</label>
          <select name="book" id="book" class="form-select">
            <option value="">-- Select --</option>
            {{ $books := .Site.Data.books }}
            {{ if $books }}
              {{ range $books }}
              <option value="{{ .title }}">{{ .title }}</option>
              {{ end }}
            {{ else }}
              <option disabled>No books available</option>
            {{ end }}
          </select>
        </div>
        <div class="mb-3">
          <label for="message" class="form-label">Message</label>
          <textarea name="message" id="message" rows="5" class="form-control" required></textarea>
        </div>
        <button type="submit" class="btn btn-gold btn-lg w-100">Send Message</button>
      </form>
    </div>
  </div>
</div>
{{ end }}
